<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Bugle — {{DATE_ISO}}</title>
  <style>
    :root {
      --bg: #0d1117;
      --bg2: #161b22;
      --bg3: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent2: #3fb950;
      --tag-bg: #1f2937;
      --feature-bg: #0e1825;
      --card-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      line-height: 1.6;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Header */
    header {
      background: linear-gradient(135deg, #0e1825 0%, #161b22 100%);
      border-bottom: 1px solid var(--border);
      padding: 28px 32px 20px;
      display: flex;
      align-items: baseline;
      gap: 20px;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, #58a6ff, #79c0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header .meta {
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    /* Tabs */
    .tabs-wrapper {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }
    .tabs {
      display: flex;
      gap: 2px;
      padding: 0 24px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 14px 18px;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* Main layout */
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    main { padding: 28px 32px; max-width: 1200px; margin: 0 auto; }

    /* Section header */
    .section-desc {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    /* Feature cards */
    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(440px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }
    .card-feature {
      background: var(--feature-bg);
      border: 1px solid #1e3a5f;
      border-radius: 12px;
      padding: 24px;
      box-shadow: var(--card-shadow);
      position: relative;
      overflow: hidden;
    }
    .card-feature::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #58a6ff, #3fb950);
    }
    .card-feature .badge {
      display: inline-block;
      background: rgba(88, 166, 255, 0.15);
      color: var(--accent);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 12px;
      border: 1px solid rgba(88, 166, 255, 0.3);
    }
    .card-feature h3 {
      font-size: 1.15rem;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 12px;
    }
    .card-feature h3 a { color: var(--text); }
    .card-feature h3 a:hover { color: var(--accent); text-decoration: none; }
    .card-feature .summary {
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1.7;
      margin-bottom: 16px;
    }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .card-meta .source {
      color: var(--text-muted);
      font-size: 0.8rem;
      background: var(--tag-bg);
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }
    .card-meta .score {
      color: var(--accent2);
      font-size: 0.8rem;
      font-weight: 600;
    }
    .card-meta .comments {
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    /* Grid cards */
    .grid-label {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
      margin-top: 8px;
    }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin-bottom: 32px;
    }
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .card:hover {
      border-color: #444c56;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    .card h3 {
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.45;
      margin-bottom: 8px;
    }
    .card h3 a { color: var(--text); }
    .card h3 a:hover { color: var(--accent); text-decoration: none; }
    .card .summary {
      color: var(--text-muted);
      font-size: 0.85rem;
      line-height: 1.65;
      margin-bottom: 12px;
    }

    /* GitHub Trending special */
    .trending-section { margin-bottom: 32px; }
    .trending-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .trending-header h2 { font-size: 1rem; font-weight: 700; }
    .trending-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }
    .trending-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      transition: border-color 0.15s;
    }
    .trending-card:hover { border-color: #444c56; }
    .trending-card .repo-name {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 6px;
    }
    .trending-card .repo-desc {
      color: var(--text-muted);
      font-size: 0.82rem;
      line-height: 1.55;
      margin-bottom: 10px;
    }
    .trending-card .repo-meta {
      display: flex;
      gap: 12px;
      font-size: 0.78rem;
      color: var(--text-muted);
    }
    .trending-card .lang { color: var(--accent2); font-weight: 600; }
    .trending-card .stars-today { color: #f78166; font-weight: 600; }

    @media (max-width: 768px) {
      main { padding: 20px 16px; }
      .features { grid-template-columns: 1fr; }
      .cards-grid { grid-template-columns: 1fr; }
      header { padding: 20px 16px 14px; flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<header>
  <h1>Daily Bugle</h1>
  <div class="meta">{{DATE_JP}}&nbsp;·&nbsp; 生成: Claude Code (claude-sonnet-4-6)</div>
</header>

<div class="tabs-wrapper">
  <nav class="tabs">
    <button class="tab-btn active" onclick="switchTab('ai', this)">AI &amp; ML</button>
    <button class="tab-btn" onclick="switchTab('frontend', this)">Frontend</button>
    <button class="tab-btn" onclick="switchTab('backend', this)">Backend</button>
    <button class="tab-btn" onclick="switchTab('cloud', this)">Cloud &amp; CNCF</button>
    <button class="tab-btn" onclick="switchTab('oss', this)">OSS &amp; Linux</button>
    <button class="tab-btn" onclick="switchTab('startups', this)">Startups</button>
    <button class="tab-btn" onclick="switchTab('movies', this)">Movies</button>
  </nav>
</div>

<main>

<div id="tab-ai" class="tab-content active">
{{SECTION_AI}}
</div>

<div id="tab-frontend" class="tab-content">
{{SECTION_FRONTEND}}
</div>

<div id="tab-backend" class="tab-content">
{{SECTION_BACKEND}}
</div>

<div id="tab-cloud" class="tab-content">
{{SECTION_CLOUD}}
</div>

<div id="tab-oss" class="tab-content">
{{SECTION_OSS}}
</div>

<div id="tab-startups" class="tab-content">
{{SECTION_STARTUPS}}
</div>

<div id="tab-movies" class="tab-content">
{{SECTION_MOVIES}}
</div>

</main>

<script>
  function switchTab(id, btn) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-' + id).classList.add('active');
    btn.classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
</script>

</body>
</html>
